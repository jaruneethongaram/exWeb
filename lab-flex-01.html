<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop: Flexbox Navbar with Logo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <!-- ส่วนโลโก้ที่ปรับปรุง (อยู่ซ้าย) ---->
        <div class="logo">
            <img src="icon-product.png" alt="MyStore Logo"> <!-- ใส่ภาพโลโก้ของคุณ (ตั้งชื่อไฟล์ว่า logo.png) -->
            <span class="logo-text">MyStore</span>
        </div>

        <!-- ส่วนเมนู (อยู่ขวา) - เหมือนเดิม -->
        <ul class="nav-links">
            <li><a href="#">หน้าแรก</a></li>
            <li><a href="#">สินค้า</a></li>
            <li><a href="#">โปรโมชั่น</a></li>
            <li><a href="#">ติดต่อเรา</a></li>
        </ul>
    </nav>


<section class="featured-products">
    <h2>สินค้าแนะนำ</h2>
    
    <div class="product-grid">
        <div class="product-card">
            <img src="icon-product.png" alt="Product">
            <h3>ชื่อสินค้า 1</h3>
            <p>ราคา 590 บาท</p>
            <button>หยิบใส่ตะกร้า</button>
        </div>
        
        <div class="product-card">
            <img src="icon-product.png" alt="Product">
            <h3>ชื่อสินค้า 2</h3>
            <p>ราคา 750 บาท</p>
            <button>หยิบใส่ตะกร้า</button>
        </div>

        <div class="product-card">
            <img src="icon-product.png" alt="Product">
            <h3>ชื่อสินค้า 3</h3><p>ราคา 990 บาท</p><button>หยิบใส่ตะกร้า</button>
        </div>
        <div class="product-card">
            <img src="icon-product.png" alt="Product">
            <h3>ชื่อสินค้า 4</h3><p>ราคา 1,200 บาท</p><button>หยิบใส่ตะกร้า</button>
        </div>
        <div class="product-card">
            <img src="icon-product.png" alt="Product">
            <h3>ชื่อสินค้า 5</h3><p>ราคา 450 บาท</p><button>หยิบใส่ตะกร้า</button>
        </div>
        <div class="product-card">
            <img src="icon-product.png" alt="Product">
            <h3>ชื่อสินค้า 6</h3><p>ราคา 880 บาท</p><button>หยิบใส่ตะกร้า</button>
        </div>
    </div>
</section>    

</body>
</html>
